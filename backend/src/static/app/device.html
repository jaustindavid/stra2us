<!doctype html>
<!--
  Per-app branding placeholders {{APP}} and {{THEME_HASH}} are
  substituted at request time by `device_page` in
  backend/src/api/routes_app.py before this file is served. The
  `data-app="<slug>"` on <body> is what the per-app theme stylesheet
  scopes its `--app-*` custom-property overrides to. P2 of
  docs/fr_catalog_app_ui_plan.md.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Device</title>
    <link rel="stylesheet" href="/app/_static/styles.css?v=3">
    <link rel="stylesheet" href="/app/{{APP}}/_theme.css?v={{THEME_HASH}}">
</head>
<body class="app-page app-device-page" data-app="{{APP}}"
      data-device="{{DEVICE}}"
      data-telemetry-topic="{{TELEMETRY_TOPIC}}"
      data-heartbeat-seconds="{{HEARTBEAT_SECONDS}}">
    <main class="app-device">
        <header class="device-header">
            <!-- Device name + status badge. Filled in by app.js (the
                 telemetry tail keeps the badge live). The catalog +
                 settings form themselves are server-rendered now (P3),
                 so the "Loading…" skeleton is only here for the
                 device-name + status, which still depend on /me +
                 telemetry fetches. -->
            <h1 id="deviceName">Loading&hellip;</h1>
            <div class="device-status">
                <span id="statusBadge" class="status-badge status-loading">&hellip;</span>
                <span id="statusDetail" class="status-detail"></span>
            </div>
        </header>

        {{SETTINGS_SECTION}}

        <section class="activity" id="activitySection">
            <h2>Recent activity</h2>
            <div id="activityList">
                <p class="hint">Loading&hellip;</p>
            </div>
        </section>

        <footer class="device-footer">
            <p class="hint" id="footerHint"></p>
        </footer>
    </main>

    <!-- Customer-page JS: `/me` fetch, telemetry-tail polling, the
         Reveal-button decryption flow for encrypted secrets. The
         settings form is server-rendered (P3), so app.js no longer
         parses catalogs client-side and js-yaml is gone from the
         page (CSP win — drops the `cdn.jsdelivr.net` script-src
         violation that was hiding behind Report-Only). -->
    <script src="/app/_static/app.js?v=8" defer></script>
</body>
</html>

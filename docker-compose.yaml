version: '3.8'

services:
  stra2us-iot:
    build:
      # Build context is the repo root so the image can pull in
      # `tools/stra2us_cli/` alongside `backend/` (P5 followup #2).
      # Pre-#2 the context was `./backend` and the backend's
      # markdown sanitizer + catalog model were vendored copies
      # with a parity test; now `pip install ./tools/` at image
      # build resolves `stra2us_cli` into the venv directly. See
      # docs/csp_admin_audit.md and docs/fr_catalog_app_ui_progress.md.
      context: .
      dockerfile: backend/Dockerfile
    container_name: stra2us-iot
    ports:
      - "8153:8153"
    volumes:
      # Map host data folder for Redis persistence
      - ./redis_data:/data

      # Map host backend folder for the application software (checked out from GitHub)
      - ./backend:/app
    environment:
      - REDIS_URL=redis://localhost:6379
      - PYTHONPATH=/app/src
      - STRA2US_GOOGLE_OAUTH_ENABLED=1
      - STRA2US_GOOGLE_CLIENT_ID=${STRA2US_GOOGLE_CLIENT_ID}
      - STRA2US_GOOGLE_CLIENT_SECRET=${STRA2US_GOOGLE_CLIENT_SECRET}
      - STRA2US_OAUTH_REDIRECT_URI=https://stra2us.austindavid.com/oauth/google/callback
    restart: unless-stopped
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stra2us-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - stra2us-iot

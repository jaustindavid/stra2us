# Lint smoke fixture — secret-pairing warnings (v1.6.4).
#
# Three independent vars, each tripping a different leg of the
# secret-pairing lint introduced in v1.6.4:
#
#   wifi_password   : `encrypted: true` without `widget: secret`
#                     → warns "renders as a plain text input"
#   api_token       : `widget: secret` without `encrypted: true`
#                     → warns "value is stored in plaintext"
#   recovery_phrase : `widget: secret` without `write_only: true`
#                     → warns "untouched submit will write the empty
#                              value over the stored one"
#
# All three are warnings, not errors — the catalog is publishable
# as-is. Operators verifying that the lint surface fires correctly
# should see THREE warning lines on stderr and `lint OK (3 warnings)`
# on stdout, exit 0.
#
# Expected behavior:
#   stra2us --catalog /tools/examples/lint_smoke/secret_pairing.s2s.yaml catalog lint
#     stdout : "lint_smoke_secret_pairing: lint OK (3 warnings)"
#     stderr : 3 lines, one per var.<name>.{encrypted,widget}
#     exit   : 0
#
# Each var's "fix" is explicitly NOT applied in this fixture; the
# whole point is to surface the warnings. The corresponding clean
# triplet (`widget: secret` + `write_only: true` + `encrypted: true`)
# lives on `wifi_password` in `critterchron_v2.s2s.yaml` for
# reference.

app: lint_smoke_secret_pairing

vars:
  # Encrypted at rest, but the customer page would render an
  # unmasked text input. Will warn.
  wifi_password:
    type: string
    scope: [app, device]
    default: ""
    label: Wi-Fi password (missing widget:secret)
    encrypted: true

  # Masked input, but stored as plaintext. Will warn.
  # Has `write_only: true` so we don't double-trip on the third
  # leg — keeps each fixture var to one warning for clarity.
  api_token:
    type: string
    scope: [app]
    default: ""
    label: API token (missing encrypted)
    widget: secret
    write_only: true

  # Masked input, encrypted at rest, but no `write_only` — an
  # untouched submit would overwrite the stored value with empty
  # string. Will warn.
  recovery_phrase:
    type: string
    scope: [app]
    default: ""
    label: Recovery phrase (missing write_only)
    widget: secret
    encrypted: true

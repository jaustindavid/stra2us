<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Demo logo for the critterchron_v2 catalog. Round face with a
    pair of clock hands — minimal, allowlist-clean (no <script>,
    no inline style, no foreignObject, no external href, no on*
    handlers). Sanitizer round-trip is the test.
  -->
  <circle cx="16" cy="16" r="14" fill="#5b3fb8" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="16" cy="16" r="1.5" fill="#ffb86c"/>
  <line x1="16" y1="16" x2="16" y2="7" stroke="#ffb86c" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="22" y2="16" stroke="#ffb86c" stroke-width="2" stroke-linecap="round"/>
</svg>
